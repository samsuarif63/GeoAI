<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebGIS - Jakarta Landmark</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #map {
            height: 100vh;
            width: 100%;
        }

        .info-panel {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <div class="info-panel">
        <h3>My Free WebGIS</h3>
        <p>Aplikasi GIS sederhana berbasis Flask + Leaflet.</p>
        <p><i>Data di-load secara dinamis dari API Flask.</i></p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Definisikan Basemaps
        var osm = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        });

        var satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        // Inisialisasi peta di pusat Makassar (Pantai Losari) dengan layer default OSM
        var map = L.map('map', {
            center: [-5.1441, 119.4082],
            zoom: 13,
            layers: [osm]
        });

        // Objek untuk kontrol layer
        var baseMaps = {
            "OpenStreetMap (Jalan)": osm,
            "Satelit (Esri)": satellite
        };

        // Tambahkan kontrol layer ke peta
        L.control.layers(baseMaps).addTo(map);


        // Fetch data dari API Flask
        fetch('/api/data')
            .then(response => response.json())
            .then(data => {
                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        if (feature.properties && feature.properties.name) {
                            layer.bindPopup("<b>" + feature.properties.name + "</b><br>" + feature.properties.description);
                        }
                    }
                }).addTo(map);
            })
            .catch(error => console.error('Error fetching data:', error));
    </script>
</body>

</html>
